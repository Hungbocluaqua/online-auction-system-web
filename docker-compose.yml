services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - auction-app
    restart: unless-stopped

  auction-app:
    build: .
    ports:
      - "8080:8080"
      - "8889:8889"
    volumes:
      - auction-uploads:/app/uploads
    environment:
      - JAVA_OPTS=-Xmx512m
      - DB_URL=jdbc:postgresql://postgres:5432/auction
      - DB_USER=auction
      - DB_PASSWORD=auction_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - ZALOPAY_APP_ID=
      - ZALOPAY_KEY1=
      - ZALOPAY_KEY2=
      - ZALOPAY_PRODUCTION=false
      - BASE_URL=http://localhost:8080
      - SENDGRID_API_KEY=
      - EMAIL_FROM=noreply@auctionsystem.com
      - EMAIL_FROM_NAME=Auction System
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=auction
      - POSTGRES_USER=auction
      - POSTGRES_PASSWORD=auction_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  auction-uploads:
  prometheus-data:
  grafana-data:
